name: Daily Discuss Archive

on:
  schedule:
    # 毎日 JST 0:00 (UTC 15:00) に実行
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write
  discussions: read

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch yesterday's discussions (JST) and append to DiscussArchive.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # JSTで「昨日」の日付を取得
          TARGET_JST=$(TZ=Asia/Tokyo date -d 'yesterday' '+%Y-%m-%d')

          # JSTの昨日 00:00:00 〜 23:59:59 を UTC に変換（GitHub API は UTC）
          UTC_START=$(date -u -d "${TARGET_JST}T00:00:00+09:00" '+%Y-%m-%dT%H:%M:%SZ')
          UTC_END=$(date -u -d "${TARGET_JST}T23:59:59+09:00" '+%Y-%m-%dT%H:%M:%SZ')

          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.repository }}"
          REPO="${REPO##*/}"

          ARCHIVE="DiscussArchive.md"
          SECTION="## ${TARGET_JST}"

          # 既存ファイル準備
          if [ ! -f "$ARCHIVE" ]; then
            printf '# Discuss Archive\n\n' > "$ARCHIVE"
          fi

          # すでに同日のセクションがあるなら終了（重複防止）
          if grep -qF "$SECTION" "$ARCHIVE"; then
            echo "Section for ${TARGET_JST} already exists. Skipping."
            exit 0
          fi

          # GraphQL: createdAt で降順、title/url/body/createdAt を取得
          GQL_QUERY='query($owner:String!, $repo:String!, $after:String) {
            repository(owner:$owner, name:$repo) {
              discussions(first:100, after:$after, orderBy:{field:CREATED_AT, direction:DESC}) {
                pageInfo { hasNextPage endCursor }
                nodes { title url body createdAt }
              }
            }
          }'

          OUT=""
          CURSOR=""

          while true; do
            if [ -n "$CURSOR" ]; then
              PAYLOAD=$(jq -n \
                --arg q "$GQL_QUERY" \
                --arg owner "$OWNER" \
                --arg repo "$REPO" \
                --arg cursor "$CURSOR" \
                '{query: $q, variables: {owner: $owner, repo: $repo, after: $cursor}}')
            else
              PAYLOAD=$(jq -n \
                --arg q "$GQL_QUERY" \
                --arg owner "$OWNER" \
                --arg repo "$REPO" \
                '{query: $q, variables: {owner: $owner, repo: $repo}}')
            fi

            RESPONSE=$(curl -s -X POST https://api.github.com/graphql \
              -H "Authorization: bearer $GH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")

            # GraphQL errors があれば止める
            if echo "$RESPONSE" | jq -e '.errors? | length > 0' >/dev/null; then
              echo "GraphQL returned errors:"
              echo "$RESPONSE" | jq -r '.errors[]?.message'
              exit 1
            fi

            # 対象日の Discussion を Markdown で整形
            NEW=$(echo "$RESPONSE" | jq -r \
              --arg start "$UTC_START" \
              --arg end "$UTC_END" \
              '
              .data.repository.discussions.nodes[]
              | select(.createdAt >= $start and .createdAt <= $end)
              | "- [\(.title)](\(.url))\n  - " +
                (
                  (.body // "")
                  | gsub("[\\r\\n]+"; " ")
                  | gsub("[[:space:]]+"; " ")
                  | .[0:80]
                  + "“…”"
                )
              ')

            if [ -n "$NEW" ]; then
              OUT="${OUT}${NEW}"$'\n'
            fi

            HAS_NEXT=$(echo "$RESPONSE" | jq -r '.data.repository.discussions.pageInfo.hasNextPage')
            OLDEST=$(echo "$RESPONSE" | jq -r '.data.repository.discussions.nodes | if length > 0 then last.createdAt else "" end')

            # 取得した最古が範囲より古いなら、これ以上ページングしても対象が増えない
            if [ "$HAS_NEXT" != "true" ] || [ -z "$OLDEST" ] || [[ "$OLDEST" < "$UTC_START" ]]; then
              break
            fi

            CURSOR=$(echo "$RESPONSE" | jq -r '.data.repository.discussions.pageInfo.endCursor')
          done

          OUT=$(printf '%s' "$OUT" | sed 's/[[:space:]]*$//')
          if [ -z "$OUT" ]; then
            echo "No discussions found for ${TARGET_JST}. Skipping."
            exit 0
          fi

          printf '\n%s\n\n%s\n' "$SECTION" "$OUT" >> "$ARCHIVE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$ARCHIVE"

          # 空コミット防止
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "docs: add discuss archive for ${TARGET_JST}"
          git push origin main
