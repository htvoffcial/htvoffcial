name: Build and Deploy

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 変換ツール(Pandoc)をインストール
      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      # 2. 公開用ディレクトリの作成と変換
      - name: Build site
        run: |
          mkdir dist
          # README.md を HTML化 (GitHub風のシンプルなスタイル)
          pandoc README.md -s -o dist/index.html --metadata title="r1.harutv.me"
          # 他のファイルもコピー（あれば）
          cp DiscussArchive.md dist/ || true
          # CNAME ファイルを作成
          echo "r1.harutv.me" > dist/CNAME

      # 3. gh-pagesブランチへデプロイ
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
