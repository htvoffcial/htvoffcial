name: Build and Deploy

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. ビルド用のソースディレクトリを作成
      - name: Prepare source
        run: |
          mkdir _build_src
          # README.md を index.md としてコピー（トップページ用）
          cp README.md _build_src/index.md
          # 他のファイルもコピー（あれば）
          cp DiscussArchive.md _build_src/ || true
          # ここで CNAME ファイルを作成（権限エラーを回避）
          echo "r1.harutv.me" > _build_src/CNAME

      # 2. Jekyllでビルド
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: _build_src/
          destination: ./dist

      # 3. gh-pagesブランチへデプロイ
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
