name: Build

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 2. GitHub風のCSSを取得してビルド
      - name: Build site
        run: |
          mkdir dist
       
          echo "r1.harutv.me" > dist/CNAME
          # 他のファイルもコピー（あれば）
          cp DiscussArchive.md dist/ || true

