name: Deploy Pages

on:
  push:
    branches: ["main"] # mainブランチにプッシュされたら実行

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./     # リポジトリのルートを公開
          cname: r1.harutv.me  # ここにドメインを指定（自動的にCNAMEが生成される）
          exclude_assets: '.github' # ワークフローファイル自体は公開しない
