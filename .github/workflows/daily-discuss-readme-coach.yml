name: Daily Discuss README Coach

on:
  schedule:
    # 毎日 JST 0:05 (UTC 15:05)
    - cron: '5 15 * * *'
  workflow_dispatch:

permissions:
  contents: write
  discussions: read

jobs:
  coach:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update README with yesterday discuss coach text
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          node scripts/discuss_readme_coach.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git add README.md
          git commit -m "docs: update discuss coach"
          git push origin main
