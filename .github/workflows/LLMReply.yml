name: Discussion → HaruharuRIM1 Reply Bot
on:
  discussion:
    types: [created]

permissions:
  contents: read
  discussions: write

jobs:
  reply:
    runs-on: ubuntu-latest
    steps:
      - name: Call HaruharuRIM1 and post reply
        uses: actions/github-script@v6
        env:
          HaruharuRIM1_API_BASE: ${{ secrets.HaruharuRIM1_API_BASE }}   # 任意。未設定時はデフォルトを使います
          HaruharuRIM1_API_KEY: ${{ secrets.HaruharuRIM1_API_KEY }}     # 任意。API にキーが必要なら設定してください
        with:
          script: |
            const apiBase = process.env.HaruharuRIM1_API_BASE || 'https://harutv.stars.ne.jp/LLM2/api';
            const apiKey  = process.env.HaruharuRIM1_API_KEY || '';

            const discussion = context.payload.discussion;
            if (!discussion) {
              core.info('No discussion payload — skipping.');
              return;
            }

            // ユーザーが Bot の場合は無視（無限ループ防止）
            if (discussion.user?.type?.toLowerCase() === 'bot') {
              core.info(`Creator is a bot (${discussion.user.login}) — skipping.`);
              return;
            }

            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const discussionNumber = discussion.number;

            const question = (discussion.body || discussion.title || '').trim();
            if (!question) {
              core.info('Empty discussion body/title — skipping.');
              return;
            }

            // -----------------------------
            // 1) 既に投稿済みか（<!-- llm2-bot -->）を GraphQL で確認
            // -----------------------------
            const marker = '<!-- llm2-bot -->';

            const checkQuery = `
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  discussion(number: $number) {
                    id
                    comments(first: 50) {
                      nodes { body }
                    }
                  }
                }
              }
            `;

            const checkRes = await github.graphql(checkQuery, {
              owner,
              repo,
              number: discussionNumber,
            });

            const discussionNode = checkRes?.repository?.discussion;
            if (!discussionNode?.id) {
              core.setFailed('Could not resolve discussion via GraphQL (missing discussion id).');
              return;
            }

            const existingComments = discussionNode.comments?.nodes || [];
            const already = existingComments.some(c => (c?.body || '').includes(marker));
            if (already) {
              core.info('Bot has already replied (marker found) — skipping.');
              return;
            }

            // -----------------------------
            // 2) HaruharuRIM1 に問い合わせ
            // -----------------------------
            const payload = {
              question,
              history: [],
              kb_id: 'default',
              tone: 'casual',
              format: 'markdown'
            };

            const headers = { 'Content-Type': 'application/json' };
            if (apiKey) headers['Authorization'] = `Bearer ${apiKey}`;

            core.info(`Calling HaruharuRIM1 at ${apiBase}/chat`);
            const resp = await fetch(`${apiBase}/chat`, {
              method: 'POST',
              headers,
              body: JSON.stringify(payload),
            });

            if (!resp.ok) {
              const text = await resp.text();
              core.setFailed(`HaruharuRIM1 API returned ${resp.status}: ${text}`);
              return;
            }

            const data = await resp.json();
            if (!data?.ok) {
              core.setFailed(`HaruharuRIM1 API error: ${data?.error || JSON.stringify(data)}`);
              return;
            }

            const answer =
              data.answer ??
              data.clarify_question ??
              data.tool_result?.output ??
              '';

            if (!answer) {
              core.info('HaruharuRIM1 returned no answer — skipping comment.');
              return;
            }

            // -----------------------------
            // 3) GraphQL で Discussion にコメント投稿
            // -----------------------------
            const commentBody = [
              marker,
              `こんにちは @${discussion.user.login}、自動応答です。`,
              '',
              answer,
              '',
              '_このコメントは HaruharuRIM1 により自動生成されています。問題がある場合は削除してください。_'
            ].join('\n');

            const addCommentMutation = `
              mutation($discussionId: ID!, $body: String!) {
                addDiscussionComment(input: {discussionId: $discussionId, body: $body}) {
                  comment { id url }
                }
              }
            `;

            const addRes = await github.graphql(addCommentMutation, {
              discussionId: discussionNode.id,
              body: commentBody,
            });

            core.info(`Posted reply: ${addRes?.addDiscussionComment?.comment?.url || '(url unavailable)'}`);
