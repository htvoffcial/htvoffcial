name: Search Oniisan

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "yyyy/mm/dd または mm/dd（年省略時は実行年）"
        required: true
        default: "01/01"

permissions:
  contents: read

jobs:
  search-oniisan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show simple merged diff log
        shell: bash
        run: |
          set -euo pipefail

          RAW_DATE='${{ github.event.inputs.target_date }}'

          if [[ "$RAW_DATE" =~ ^[0-9]{4}/(0[1-9]|1[0-2])/(0[1-9]|[12][0-9]|3[01])$ ]]; then
            TARGET_DATE="$RAW_DATE"
          elif [[ "$RAW_DATE" =~ ^(0[1-9]|1[0-2])/(0[1-9]|[12][0-9]|3[01])$ ]]; then
            TARGET_DATE="$(date -u +%Y)/$RAW_DATE"
          else
            echo "Input format error: use yyyy/mm/dd or mm/dd"
            exit 1
          fi

          if ! date -d "${TARGET_DATE//\//-}" >/dev/null 2>&1; then
            echo "Invalid date: $TARGET_DATE"
            exit 1
          fi

          TARGET_TS="$(date -u -d "${TARGET_DATE//\//-} 23:59:59" +"%Y-%m-%dT%H:%M:%SZ")"

          FILE_A="README.md"
          FILE_B=".github/English/README.md"

          COMMIT_A="$(git log -1 --format=%H --before="$TARGET_TS" -- "$FILE_A" || true)"
          COMMIT_B="$(git log -1 --format=%H --before="$TARGET_TS" -- "$FILE_B" || true)"

          if [[ -z "$COMMIT_A" || -z "$COMMIT_B" ]]; then
            echo "Could not find past commit for one or both files at/before $TARGET_DATE"
            echo "README.md commit: ${COMMIT_A:-not found}"
            echo ".github/English/README.md commit: ${COMMIT_B:-not found}"
            exit 1
          fi

          OLD_A="/tmp/old_readme.md"
          OLD_B="/tmp/old_english_readme.md"
          CUR_A="/tmp/current_readme.md"
          CUR_B="/tmp/current_english_readme.md"
          DIFF_A="/tmp/diff_readme.txt"
          DIFF_B="/tmp/diff_english_readme.txt"
          NORM_A="/tmp/norm_readme.txt"
          NORM_B="/tmp/norm_english_readme.txt"
          COMMON="/tmp/common_diff_lines.txt"

          git show "${COMMIT_A}:${FILE_A}" > "$OLD_A"
          git show "${COMMIT_B}:${FILE_B}" > "$OLD_B"
          cat "$FILE_A" > "$CUR_A"
          cat "$FILE_B" > "$CUR_B"

          diff -u "$OLD_A" "$CUR_A" > "$DIFF_A" || true
          diff -u "$OLD_B" "$CUR_B" > "$DIFF_B" || true

          normalize_diff_lines() {
            local input_file="$1"
            local output_file="$2"
            grep -E '^[+-]' "$input_file" \
              | grep -Ev '^\+\+\+|^---' \
              | sed 's/^[+-]//' \
              | sed 's/[[:space:]]\+/ /g' \
              | sed 's/^ //; s/ $//' \
              | sed '/^$/d' \
              | sort -u > "$output_file" || true
          }

          normalize_diff_lines "$DIFF_A" "$NORM_A"
          normalize_diff_lines "$DIFF_B" "$NORM_B"

          # comm -12: sort済み2ファイルの共通行のみを抽出
          comm -12 "$NORM_A" "$NORM_B" > "$COMMON" || true

          echo "========== search-oniisan =========="
          echo "Target date: $TARGET_DATE"
          echo "Target timestamp(UTC): $TARGET_TS"
          echo "README.md base commit: $COMMIT_A"
          echo ".github/English/README.md base commit: $COMMIT_B"
          echo

          echo "--- README.md diff (past -> current) ---"
          cat "$DIFF_A"
          echo

          echo "--- .github/English/README.md diff (past -> current) ---"
          cat "$DIFF_B"
          echo

          echo "--- Merged matched diff lines ---"
          if [[ -s "$COMMON" ]]; then
            cat "$COMMON"
          else
            echo "(No matched diff lines)"
          fi
