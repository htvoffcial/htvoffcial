name: Post Oniisan to Blogger (Daily JA+EN)

on:
  schedule:
    # 16:30 JST = 07:30 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: post-oniisan-to-blogger
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Tokyo
      BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
      BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
      BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
      BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Build JA and EN content
        id: build
        shell: bash
        run: |
          set -euo pipefail

          TARGET_DATE="$(date -d 'yesterday' +%Y/%m/%d)"
          echo "TARGET_DATE=$TARGET_DATE"

          TARGET_TS="$(date -u -d "${TARGET_DATE//\//-} 23:59:59" +"%Y-%m-%dT%H:%M:%SZ")"

          FILE_JA="README.md"
          FILE_EN=".github/English/README.md"

          COMMIT_JA="$(git log -1 --format=%H --before="$TARGET_TS" -- "$FILE_JA" || true)"
          COMMIT_EN="$(git log -1 --format=%H --before="$TARGET_TS" -- "$FILE_EN" || true)"

          if [[ -z "$COMMIT_JA" && -z "$COMMIT_EN" ]]; then
            echo "No historical content found."
            exit 1
          fi

          ##################################################
          # 日本語版
          ##################################################

          JA_TITLE="お兄さんアーカイブ ${TARGET_DATE}"
          JA_BODY=""

          if [[ -n "$COMMIT_JA" ]]; then

            JA_TEXT="$(
              git show "${COMMIT_JA}:${FILE_JA}" |
              awk '
                /<!-- DISCUSS_COACH_START -->/ {
                  flag=1
                  next
                }

                /<!-- DISCUSS_COACH_END -->/ {
                  flag=0
                }

                flag
              '
            )"

            if [[ -n "$JA_TEXT" ]]; then
              JA_BODY="$(printf '%s' "$JA_TEXT" | pandoc -f markdown -t html)"
            else
              JA_BODY="<p>この日の日本語コンテンツが見つかりませんでした。</p>"
            fi

          else
            JA_BODY="<p>この日のREADME.mdが見つかりませんでした。</p>"
          fi

          ##################################################
          # 英語版
          #
          # STARTタグなし
          # 先頭～ENDタグまで
          ##################################################

          EN_TITLE="Oniisan Archive ${TARGET_DATE} (English)"
          EN_BODY=""

          if [[ -n "$COMMIT_EN" ]]; then

            EN_TEXT="$(
              git show "${COMMIT_EN}:${FILE_EN}" |
              awk '
                /<!-- DISCUSS_COACH_END -->/ {
                  exit
                }

                {
                  print
                }
              '
            )"

            if [[ -n "$EN_TEXT" ]]; then
              EN_BODY="$(printf '%s' "$EN_TEXT" | pandoc -f markdown -t html)"
            else
              EN_BODY="<p>English content not found.</p>"
            fi

          else
            EN_BODY="<p>English README not found.</p>"
          fi

          printf '%s' "$JA_TITLE" > title_ja.txt
          printf '%s' "$JA_BODY"  > content_ja.html

          printf '%s' "$EN_TITLE" > title_en.txt
          printf '%s' "$EN_BODY"  > content_en.html

      - name: Get Blogger OAuth token
        id: token
        shell: bash
        run: |
          set -euo pipefail

          RESPONSE="$(
            curl -sS \
              -X POST \
              https://oauth2.googleapis.com/token \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data-urlencode "client_id=${BLOGGER_CLIENT_ID}" \
              --data-urlencode "client_secret=${BLOGGER_CLIENT_SECRET}" \
              --data-urlencode "refresh_token=${BLOGGER_REFRESH_TOKEN}" \
              --data-urlencode "grant_type=refresh_token"
          )"

          ACCESS_TOKEN="$(echo "$RESPONSE" | jq -r '.access_token')"

          if [[ -z "$ACCESS_TOKEN" || "$ACCESS_TOKEN" == "null" ]]; then
            echo "$RESPONSE"
            exit 1
          fi

          echo "access_token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Create Blogger posts
        shell: bash
        env:
          ACCESS_TOKEN: ${{ steps.token.outputs.access_token }}
        run: |
          set -euo pipefail

          create_post() {

            local TITLE_FILE="$1"
            local CONTENT_FILE="$2"
            local LABEL="$3"

            jq -n \
              --arg title "$(cat "$TITLE_FILE")" \
              --arg content "$(cat "$CONTENT_FILE")" \
              --arg label "$LABEL" \
              '{
                kind: "blogger#post",
                title: $title,
                content: $content,
                labels: [$label]
              }' \
              > payload.json

            curl -sS \
              -X POST \
              "https://www.googleapis.com/blogger/v3/blogs/${BLOG_ID}/posts/" \
              -H "Authorization: Bearer ${ACCESS_TOKEN}" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d @payload.json
          }

          create_post title_ja.txt content_ja.html "日本語"
          create_post title_en.txt content_en.html "English"
